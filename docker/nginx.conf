worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=200r/m;

    # Docker's embedded DNS – re-resolve upstreams so 502 doesn't happen after container restarts
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    server {
        listen 80;
        server_name localhost;
        client_max_body_size 10M;

        # Variables force runtime DNS resolution (with resolver above)
        set $backend_web "http://web:3000";
        set $backend_api "http://api:4000";

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass $backend_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /health {
            proxy_pass $backend_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
        location /socket.io/ {
            proxy_pass $backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
        location /uploads/ {
            proxy_pass $backend_api;
            proxy_set_header Host $host;
        }
        location / {
            limit_req zone=general burst=50 nodelay;
            proxy_pass $backend_web;
            proxy_http_version 1.1;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
